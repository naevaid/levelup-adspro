name: levelup-adspro-prod

services:
  caddy:
    image: caddy:2-alpine
    container_name: levelup-adspro-caddy
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: levelup-adspro-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://adspro.naeva.id/api}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: levelup-adspro-api
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://levelup:levelup@postgres:5432/levelup_adspro}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-levelup}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-levelup123}
      MINIO_BUCKET_RAW_CAPTURE: ${MINIO_BUCKET_RAW_CAPTURE:-raw-capture}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: levelup-adspro-worker
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://levelup:levelup@postgres:5432/levelup_adspro}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-levelup}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-levelup123}
      MINIO_BUCKET_RAW_CAPTURE: ${MINIO_BUCKET_RAW_CAPTURE:-raw-capture}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-bootstrap-jobs}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: levelup-adspro-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-levelup_adspro}
      POSTGRES_USER: ${POSTGRES_USER:-levelup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-levelup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-levelup} -d ${POSTGRES_DB:-levelup_adspro}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: levelup-adspro-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: levelup-adspro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-levelup}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-levelup123}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9000/minio/health/live || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
