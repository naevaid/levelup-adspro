name: levelup-adspro

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: levelup-adspro-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-local}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: levelup-adspro-api
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-local}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://levelup:levelup@postgres:5432/levelup_adspro}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-levelup}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-levelup123}
      MINIO_BUCKET_RAW_CAPTURE: ${MINIO_BUCKET_RAW_CAPTURE:-raw-capture}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
      JWT_SECRET: ${JWT_SECRET:-replace-me-in-local}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: levelup-adspro-worker
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://levelup:levelup@postgres:5432/levelup_adspro}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-levelup}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-levelup123}
      MINIO_BUCKET_RAW_CAPTURE: ${MINIO_BUCKET_RAW_CAPTURE:-raw-capture}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-bootstrap-jobs}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: levelup-adspro-postgres
    environment:
      POSTGRES_DB: levelup_adspro
      POSTGRES_USER: levelup
      POSTGRES_PASSWORD: levelup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U levelup -d levelup_adspro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: levelup-adspro-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio
    container_name: levelup-adspro-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: levelup
      MINIO_ROOT_PASSWORD: levelup123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:9000/minio/health/live || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
